services:
  ewm-event-db:
    image: postgres:16.1
    container_name: ewm-event-db
    environment:
      POSTGRES_DB: ewm_events
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - ewm-event-db-data:/var/lib/postgresql/data
      - ./core/event-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ewm_events"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ewm-user-db:
    image: postgres:16.1
    container_name: ewm-user-db
    environment:
      POSTGRES_DB: ewm_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - ewm-user-db-data:/var/lib/postgresql/data
      - ./core/user-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ewm_users"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ewm-request-db:
    image: postgres:16.1
    container_name: ewm-request-db
    environment:
      POSTGRES_DB: ewm_requests
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - ewm-request-db-data:/var/lib/postgresql/data
      - ./core/request-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ewm_requests"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stats-db:
    image: postgres:16.1
    container_name: ewm-stats-db
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: stats
      POSTGRES_PASSWORD: stats
    ports:
      - "5433:5432"
    volumes:
      - stats-db-data:/var/lib/postgresql/data
      - ./stats/stats-server/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stats -d stats"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ewm-event-db-data:
    driver: local
  ewm-user-db-data:
    driver: local
  ewm-request-db-data:
    driver: local
  stats-db-data:
    driver: local
