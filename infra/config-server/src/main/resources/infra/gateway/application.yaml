spring:
  application:
    name: gateway-server

  config:
    import: optional:configserver:http://localhost:8888

  cloud:
    gateway:
      routes:
        - id: stats_hit_route
          uri: lb://STATS-SERVER
          predicates:
            - Path=/stats-server/hit/**
          filters:
            - name: StripPrefix
              args:
                parts: 1

        - id: stats_route
          uri: lb://STATS-SERVER
          predicates:
            - Path=/stats-server/stats/**
          filters:
            - name: StripPrefix
              args:
                parts: 1

        - id: stats_actuator_route
          uri: lb://STATS-SERVER
          predicates:
            - Path=/stats-server/actuator/**
          filters:
            - name: StripPrefix
              args:
                parts: 1

server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    preferIpAddress: true
    instance-id: ${spring.application.name}:${server.port}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: DEBUG
    org.springframework.cloud.client.loadbalancer: DEBUG
    com.netflix.discovery: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: gateway,routes,health